<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Universal Video Downloader</title>
  <style>
    :root{--bg:#0b0b0f;--card:#0f1720;--muted:#9aa4b2;--accent:#06b6d4}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial;
      background:linear-gradient(180deg,#071124 0%, #07111b 100%);
      color:#e6eef6;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px;
    }
    .wrap{
      width:100%;
      max-width:760px;
      background:var(--card);
      border-radius:12px;
      box-shadow:0 8px 30px rgba(2,6,23,0.6);
      padding:20px;
      box-sizing:border-box;
    }
    h1{margin:0 0 10px;font-size:20px}
    p.small{margin:0 0 16px;color:var(--muted);font-size:13px}
    .row{display:flex;gap:10px;align-items:center}
    .input{
      flex:1;
      display:flex;
      gap:8px;
      align-items:center;
    }
    input[type="url"]{
      width:100%;
      padding:12px 14px;
      border-radius:8px;
      border:1px solid rgba(255,255,255,0.04);
      background:transparent;
      color:inherit;
      font-size:15px;
      outline:none;
    }
    select,button{
      padding:10px 12px;
      border-radius:8px;
      border:0;
      background:var(--accent);
      color:#022;
      font-weight:600;
      cursor:pointer;
    }
    select{background:#1f2937;color:#e6eef6;font-weight:500;padding:10px;border-radius:8px}
    .info{
      margin-top:12px;
      padding:12px;
      border-radius:8px;
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      color:var(--muted);
      font-size:14px;
    }
    .services{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
    .svc-btn{background:#0ea5a4;padding:8px 10px;border-radius:8px;border:0;color:#012;cursor:pointer}
    .small-link{color:var(--muted);font-size:13px;text-decoration:none}
    @media(max-width:520px){
      .row{flex-direction:column;align-items:stretch}
      select,button{width:100%}
      .services{flex-direction:column}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Video Downloader</h1>
    <p class="small">Paste a video page link (YouTube / TikTok / Instagram / Facebook / X / Reddit). The site will open an external downloader in a new tab — no server required.</p>

    <div class="row">
      <div class="input">
        <input id="link" type="url" placeholder="Paste video page link here (e.g. https://...)" />
      </div>
      <button id="detectBtn">Detect</button>
    </div>

    <div id="result" class="info">No link detected yet.</div>

    <div id="serviceArea" style="display:none">
      <label style="display:block;margin-top:12px;color:var(--muted);font-size:13px">Choose a downloader service</label>
      <select id="serviceSelect"></select>

      <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
        <button id="openBtn">Open downloader</button>
        <button id="copyBtn" style="background:#334155;color:#e6eef6">Copy video page link</button>
      </div>

      <div style="margin-top:10px" class="small-link" id="note"></div>
    </div>
  </div>

  <script>
    // Platform -> list of external downloaders (templates use ${u})
    const services = {
      youtube: [
        {name:'y2mate (mp4)', url:'https://y2mate.is/en/youtube?url=${u}'},
        {name:'y2mate (alt)', url:'https://www.y2mate.com/youtube/${u}'}
      ],
      tiktok: [
        {name:'SnapTik', url:'https://snaptik.app/?url=${u}'},
        {name:'ssstik', url:'https://ssstik.io/en?url=${u}'}
      ],
      instagram: [
        {name:'iGram', url:'https://igram.world/?url=${u}'},
        {name:'SaveInsta', url:'https://saveinsta.app/?url=${u}'}
      ],
      facebook: [
        {name:'FDown', url:'https://fdown.net/?u=${u}'},
        {name:'Getfvid', url:'https://www.getfvid.com/downloader?url=${u}'}
      ],
      x: [
        {name:'TWDown', url:'https://twdown.net/?url=${u}'}
      ],
      reddit: [
        {name:'RedditSave', url:'https://redditsave.com/info?url=${u}'}
      ]
    };

    const linkEl = document.getElementById('link');
    const detectBtn = document.getElementById('detectBtn');
    const result = document.getElementById('result');
    const serviceArea = document.getElementById('serviceArea');
    const serviceSelect = document.getElementById('serviceSelect');
    const openBtn = document.getElementById('openBtn');
    const copyBtn = document.getElementById('copyBtn');
    const note = document.getElementById('note');

    function encode(u){ return encodeURIComponent(u); }

    function detectPlatform(url){
      const u = url.toLowerCase();
      if(!u) return null;
      if(u.includes('youtube.com') || u.includes('youtu.be')) return 'youtube';
      if(u.includes('tiktok.com') || u.includes('vm.tiktok.com')) return 'tiktok';
      if(u.includes('instagram.com') || u.includes('instagr.am')) return 'instagram';
      if(u.includes('facebook.com') || u.includes('fb.watch')) return 'facebook';
      if(u.includes('x.com') || u.includes('twitter.com')) return 'x';
      if(u.includes('reddit.com') || u.includes('v.redd.it')) return 'reddit';
      return null;
    }

    function showServices(platform, originalUrl){
      serviceSelect.innerHTML = '';
      const list = services[platform] || [];
      list.forEach((s, idx) => {
        const opt = document.createElement('option');
        opt.value = idx;
        opt.textContent = s.name;
        serviceSelect.appendChild(opt);
      });
      if(list.length === 0){
        result.textContent = 'No known downloader services listed for this site. You can copy the link and try a search engine.';
        serviceArea.style.display = 'none';
        note.textContent = '';
        return;
      }
      serviceArea.style.display = 'block';
      note.textContent = `Detected platform: ${platform.toUpperCase()}. These are third-party services — open one to continue.`;
      result.innerHTML = `<strong>Detected:</strong> ${platform.toUpperCase()} — ${originalUrl}`;
    }

    detectBtn.addEventListener('click', ()=>{
      const url = linkEl.value.trim();
      if(!url){
        result.textContent = 'Please paste a link first.';
        serviceArea.style.display = 'none';
        return;
      }
      const platform = detectPlatform(url);
      if(!platform){
        result.textContent = 'Platform not recognized. You can still copy the link and try a downloader manually.';
        serviceArea.style.display = 'none';
        return;
      }
      showServices(platform, url);
    });

    openBtn.addEventListener('click', ()=>{
      const url = linkEl.value.trim();
      if(!url) return alert('Paste a link first.');
      const idx = serviceSelect.value;
      const platform = detectPlatform(url);
      if(!platform) return alert('Platform not detected.');
      const svc = services[platform][idx];
      if(!svc) return alert('Select a service.');
      const target = svc.url.replace('${u}', encode(url));
      window.open(target, '_blank');
    });

    copyBtn.addEventListener('click', ()=>{
      const url = linkEl.value.trim();
      if(!url) return alert('Paste a link first.');
      navigator.clipboard?.writeText(url).then(()=> {
        copyBtn.textContent = 'Copied!';
        setTimeout(()=> copyBtn.textContent = 'Copy video page link', 1200);
      }).catch(()=> alert('Copy failed — long-press the link to copy on mobile.'));
    });

    // allow pressing Enter in input
    linkEl.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter') detectBtn.click();
    });
  </script>
</body>
</html>
