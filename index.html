<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Video Downloader (Frontend)</title>
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,Arial,Helvetica;max-width:900px;margin:36px auto;padding:0 16px}
    input,button,select{padding:10px;font-size:15px;margin:6px 0;width:100%}
    .row{display:flex;gap:8px}
    .row> *{flex:1}
    .log{white-space:pre-wrap;background:#f7f7f7;padding:12px;border-radius:8px;margin-top:12px}
  </style>
</head>
<body>
  <h1>Video Downloader (Frontend)</h1>
  <p>Paste a video page URL (YouTube, Facebook, etc.) and click <strong>Fetch info</strong>. This front-end requires a separate backend API (yt-dlp based).</p>

  <label for="videoUrl">Video URL</label>
  <input id="videoUrl" placeholder="https://..." />

  <div class="row">
    <button id="fetchBtn">Fetch info</button>
    <button id="downloadBtn" disabled>Download selected</button>
  </div>

  <div id="info" class="log">No info yet.</div>

  <script>
    // ====== CONFIG ======
    const API_BASE = "https://YOUR_API_HOST_OR_DOMAIN"; // e.g. https://example.com or http://192.168.1.20:5000
    const API_KEY = ""; // optional
    // =====================

    const el = {
      videoUrl: document.getElementById('videoUrl'),
      fetchBtn: document.getElementById('fetchBtn'),
      downloadBtn: document.getElementById('downloadBtn'),
      info: document.getElementById('info'),
    };

    function log(txt){ el.info.textContent = txt; }

    async function postJSON(path, body){
      const headers = {"Content-Type":"application/json"};
      if(API_KEY) headers["X-API-Key"] = API_KEY;
      const resp = await fetch(API_BASE + path, { method: 'POST', headers, body: JSON.stringify(body) });
      return resp.json();
    }

    async function getJSON(path){
      const headers = {};
      if(API_KEY) headers["X-API-Key"] = API_KEY;
      const resp = await fetch(API_BASE + path, { headers });
      return resp.json();
    }

    el.fetchBtn.addEventListener('click', async ()=>{
      const url = el.videoUrl.value.trim();
      if(!url){ alert('Paste a URL'); return; }
      try{
        log('Requesting info from server...');
        const r = await postJSON('/get_info', { url });
        if(!r.task_id){ log('Bad response from server: no task_id'); return; }
        log('Task started: ' + r.task_id + '\nPolling status...');
        let info = null;
        while(true){
          await new Promise(res=>setTimeout(res, 1200));
          const s = await getJSON('/status/' + r.task_id);
          const status = s.status || s;
          if(status === 'done' || status === 'finished' || status === 'completed'){
            info = s.result || s;
            break;
          } else if (status === 'error' || status === 'failed'){
            log('Task failed: ' + JSON.stringify(s));
            return;
          } else {
            log('Status: ' + JSON.stringify(s));
          }
        }

        const formats = info.formats || info.entries?.[0]?.formats || [];
        if(!formats.length){ log('No formats returned. Full info:\n' + JSON.stringify(info, null, 2)); return; }

        const list = formats.map(f => ({ id: f.format_id || Math.random().toString(36).slice(2), text: `${f.format_note || ''} ${f.ext || ''} ${f.filesize ? (Math.round(f.filesize/1024/1024)+'MB') : ''} ${f.format || ''}`.trim(), url: f.url })).slice(0,50);

        const selHtml = ['Select format:','<select id="fmtSel">'];
        list.forEach((it, idx)=> selHtml.push(`<option value="${idx}">${it.text}</option>`));
        selHtml.push('</select>');
        selHtml.push('<div style="margin-top:8px"><button id="dlFromUrlBtn">Download direct</button></div>');
        el.info.innerHTML = '<strong>Formats</strong><br>' + selHtml.join('');
        el.downloadBtn.disabled = false;

        document.getElementById('dlFromUrlBtn').addEventListener('click', ()=>{
          const s = document.getElementById('fmtSel');
          const chosen = list[s.value];
          if(!chosen || !chosen.url) return alert('No direct url for selected format');
          window.open(chosen.url, '_blank');
        });

        el.downloadBtn.onclick = async ()=>{
          const sel = document.getElementById('fmtSel');
          const chosen = list[sel.value];
          if(!chosen) return alert('Choose format');
          log('Requesting server to prepare downloadable file...');
          const resp = await postJSON('/get_video', { url, output_format: 'mp4' });
          if(!resp.task_id) { log('No task_id in response: ' + JSON.stringify(resp)); return; }
          let tid = resp.task_id;
          while(true){
            await new Promise(res=>setTimeout(res, 1500));
            const s = await getJSON('/status/' + tid);
            if(s.status === 'done' || s.status === 'finished' || s.status === 'completed'){
              const filePath = s.file || s.result?.file || s.result?.filename || s.filename || null;
              if(filePath){
                const fileUrl = API_BASE.replace(/\/+$/,'') + '/files/' + encodeURIComponent(filePath);
                log('Ready! opening: ' + fileUrl);
                window.open(fileUrl, '_blank');
                return;
              } else {
                log('Completed but no file path returned: ' + JSON.stringify(s));
                return;
              }
            } else if(s.status === 'error' || s.status === 'failed'){
              log('Task failed: ' + JSON.stringify(s));
              return;
            } else {
              log('Waiting... ' + JSON.stringify(s));
            }
          }
        };

      } catch(err){ console.error(err); log('Error: ' + err.message); }
    });
  </script>
</body>
</html>
